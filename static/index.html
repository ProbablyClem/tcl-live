<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tcl Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script type="module">
        import init, { App } from "./pkg/front.js";
        
        await init();
        const [lignes, positions] = await Promise.all([
            fetch("/api/lignes").then(r => r.json()),
            fetch("/api/positions").then(r => r.json()),
        ]);
        
        const app = new App();
        app.start();
        try {
            app.set_lignes(lignes);
            app.set_positions(positions);
            app.run(); // Consumes self
        } catch (e) {
            console.error("WASM error:", e);
        }
    </script>
</body>
</html>
