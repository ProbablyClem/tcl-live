<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-7">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <title>Tcl Live</title>
</head>
<body>
    <canvas id="canvas" width="801" height="600"></canvas>
    <script type="module">
        import init, { State } from "./pkg/front.js";

        await init();

        const [lignes, positions] = await Promise.all([
            fetch("/api/lignes").then(r => r.json()),
            fetch("/api/positions").then(r => r.json()),
        ]);

        const state = new State();

        state.set_lignes(lignes);
        state.set_positions(positions);
    </script>
</body>
</html>
